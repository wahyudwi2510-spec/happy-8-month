<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(-45deg,#081229,#172554,#4338ca,#ec4899);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* Background */

#stars{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
z-index:0;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{
opacity:.2;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1.5);
}
}

/* Moon */

.moon{
position:absolute;
top:50px;
right:60px;
width:120px;
height:120px;
background:white;
border-radius:50%;
box-shadow:
0 0 40px white,
0 0 90px white;
opacity:.9;
}

/* Glass Card */

.container{
position:relative;
z-index:10;
width:90%;
max-width:420px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.2);
text-align:center;
box-shadow:0 0 40px rgba(255,105,180,.35);
}

h1{
font-size:34px;
margin-bottom:15px;
text-shadow:0 0 15px hotpink;
}

.desc{
line-height:1.8;
margin-bottom:30px;
}

.gift{
font-size:120px;
cursor:pointer;
animation:bounce 1.8s infinite;
transition:.3s;
}

.gift:hover{
transform:scale(1.1);
filter:drop-shadow(0 0 20px pink);
}

@keyframes bounce{
50%{
transform:translateY(-15px);
}
}

.tap{
margin-top:15px;
opacity:.9;
}

/* Letter */

#letter{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow:auto;
padding:30px;
background:linear-gradient(#081229,#172554,#ec4899);
}

.paper{
max-width:900px;
margin:auto;
background:rgba(255,255,255,.08);
padding:35px;
border-radius:25px;
backdrop-filter:blur(10px);
}

.paper h1{
text-align:center;
margin-bottom:25px;
}

#typing{
white-space:pre-line;
line-height:2;
font-size:18px;
}

/* Music Button */

#musicBtn{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border:none;
border-radius:50%;
background:#ec4899;
color:white;
font-size:26px;
cursor:pointer;
box-shadow:0 0 20px hotpink;
z-index:99999;
}

/* Hearts */

.heart{
position:fixed;
pointer-events:none;
animation:heartFly 5s linear forwards;
z-index:999;
}

@keyframes heartFly{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

/* Fireworks */

.fire{
position:fixed;
pointer-events:none;
animation:boom 1s forwards;
z-index:9999;
}

@keyframes boom{
0%{
transform:scale(.2);
opacity:1;
}
100%{
transform:scale(2.5);
opacity:0;
}
}

#countdown{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.8);
font-size:180px;
font-weight:bold;
color:white;
text-shadow:0 0 20px hotpink,0 0 50px hotpink;
z-index:999999;
}

.countAnim{
animation:zoom 1s;
}

@keyframes zoom{
0%{
transform:scale(0);
opacity:0;
}
50%{
transform:scale(1.5);
}
100%{
transform:scale(1);
opacity:1;
}
}

@keyframes bgMove{
0%{
background-position:0% 50%;
}
50%{
background-position:100% 50%;
}
100%{
background-position:0% 50%;
}
}

#hugBtn{
margin-top:30px;
padding:15px 35px;
font-size:22px;
border:none;
border-radius:40px;
background:#ff4fa3;
color:white;
cursor:pointer;
box-shadow:0 0 20px hotpink;
transition:.3s;
}

#hugBtn:hover{
transform:scale(1.08);
}

#hugText{

text-align:center;

.slider{
position:relative;
width:100%;
max-width:450px;
height:300px;
margin:25px auto;
overflow:hidden;
border-radius:20px;
box-shadow:0 0 25px hotpink;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 1s;
}

.slide.active{
opacity:1;

</style>

function typing(){

// ======================
// BUKA KADO
// ======================

const gift = document.getElementById("gift");

gift.onclick = function(){

cd.classList.add("countAnim");

`0 0 ${10+Math.random()*20}px hotpink`;

const autoScroll = setInterval(()=>{

top:document.body.scrollHeight,

});

}

},1500);

// ======================

const slides = document.querySelectorAll(".slide");

setInterval(() => {

slides[currentSlide].classList.remove("active");

}
